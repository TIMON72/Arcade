# ------------ J - LED's ----------- #

## Enable LED options for devices

## -= AYN Loki =-
## Standard colour options: red, blue, green
## Custom colour options, any combination of red blue green with values of 0-255.
## Note: The Ayn kernel module is in order RBG, not RGB
## Example custom colour - purple: ayn.led.colour=128 128 0
## Brightness options: low, medium, high, off
## Settings get applied at boot
#ayn.led.colour=blue
#ayn.led.brightness=high

# ------------ K - AMD TDP ----------- #

## AMD TDP value in watts
#amd.tdp=10

# ------------ L - Other ----------- #

## Scraper
## Set order scraper prefers, separated by commas.
## s -> snapshot
## b -> boxart
## f -> fanart
## a -> banner
## l -> logo
## 3b -> 3D boxart
#scrapper.style=s,b,f,a,l,3b

## Enable DXVK for Wine and FPS HUD.
#windows.dxvk=0
#windows.dxvk_hud=0


