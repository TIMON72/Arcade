[timer]
# Шаг увеличения времени кнопкой "+" (минуты)
time_step = 5

# Пауза после окончания отсчёта перед следующим действием (секунды)
time_wait = 60

# Автосброс, если время выставлено, но игра не запущена (минуты)
time_reset = 5

[gpio]
# Входы: кнопки пульта (BCM, см. pins.png)
rf_increase = 5      # "+"
rf_playpause = 6     # Play/Pause
rf_stop = 13         # Stop

# Выходы: реле автомата (BCM)
r_buttons = 17       # IN1–IN6
r_playpause = 27     # IN7
r_stop = 22          # IN8

# true = реле включается уровнем LOW (как в Arduino-проекте)
relay_active_low = true

[matrix]
enabled = true
brightness = 7
scroll_speed = 7
text_display = "АРЕНДА: т. +79233549295"

# interface: "bitbang" — программный SPI по пинам din/clk/cs (рекомендуется на Pi 5)
#            "hardware" — /dev/spidevX.Y
interface = "bitbang"
spi_port = 10
spi_device = 0
din = 10             # MOSI / физ. 19
clk = 11             # SCLK / физ. 23
cs = 8               # CE0  / физ. 24
cascaded = 4         # 4 модуля в ряд = 32x8 пикселей
block_orientation = 90
blocks_reverse = true
# rotate: 0=нет, 1=90°, 2=180° (вверх ногами), 3=270°
rotate = 2
test_on_start = true
